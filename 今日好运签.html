<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>今日好运签 ✨</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #f0f4ff;
  --white: #ffffff;
  --yellow: #FFD93D;
  --pink: #FF6B9D;
  --pink-light: #FFB3CF;
  --blue: #4ECDC4;
  --blue-light: #A8EDEA;
  --purple: #C77DFF;
  --purple-light: #E8C4FF;
  --green: #6BCB77;
  --orange: #FF9A3C;
  --ink: #1a1a2e;
  --gray: #8892a4;
}
body {
  font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(circle at 15% 20%, rgba(255,107,157,0.08) 0%, transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(78,205,196,0.08) 0%, transparent 40%);
  min-height: 100vh;
  color: var(--ink);
  padding-bottom: 40px;
}
.header { padding: 32px 20px 16px; text-align: center; }
.header-date {
  font-size: 11px; font-weight: 500; color: var(--gray);
  letter-spacing: 2px; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.header-date::before, .header-date::after { content: '·'; color: var(--pink); }
.header-main { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 4px; }
.header-title { font-size: 26px; font-weight: 900; color: var(--ink); letter-spacing: 1px; }
.header-badge {
  background: var(--yellow); color: var(--ink);
  font-size: 11px; font-weight: 700; padding: 3px 10px;
  border-radius: 20px; border: 2px solid var(--ink); box-shadow: 2px 2px 0 var(--ink);
}
.header-sub { font-size: 12px; color: var(--gray); }
.section { margin: 14px 16px 0; }
.section-label {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--ink); color: white;
  font-size: 12px; font-weight: 700;
  padding: 5px 14px; border-radius: 20px 20px 0 0; letter-spacing: 1px;
}
.section-label .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--yellow); display: inline-block; }
.card {
  background: var(--white);
  border-radius: 0 16px 16px 16px;
  border: 2px solid var(--ink);
  box-shadow: 4px 4px 0 var(--ink);
  padding: 20px 16px;
}
.fortune-top { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 16px; }
.tube-btn {
  width: 72px; height: 100px; position: relative;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  border: none; background: none; flex-shrink: 0;
}
.tube-btn:active { transform: scale(0.95); }
@keyframes shake {
  0%   { transform: rotate(0deg); }
  10%  { transform: rotate(-10deg) translateY(-4px); }
  20%  { transform: rotate(10deg) translateY(-8px); }
  30%  { transform: rotate(-10deg) translateY(-6px); }
  40%  { transform: rotate(10deg) translateY(-10px); }
  50%  { transform: rotate(-7deg) translateY(-7px); }
  60%  { transform: rotate(7deg) translateY(-5px); }
  70%  { transform: rotate(-4deg) translateY(-3px); }
  80%  { transform: rotate(4deg) translateY(-1px); }
  100% { transform: rotate(0deg) translateY(0); }
}
.tube-btn.shaking { animation: shake 0.7s ease-out; }
.fortune-hint { font-size: 13px; color: var(--gray); text-align: left; flex: 1; line-height: 1.6; }
.fortune-hint b { color: var(--pink); font-weight: 700; }
.fortune-card {
  display: none;
  background: linear-gradient(135deg, #fff9f0 0%, #fff0f5 100%);
  border: 2px solid var(--ink); border-radius: 14px; padding: 16px;
  margin-bottom: 14px; box-shadow: 3px 3px 0 var(--ink);
}
.fortune-card.show { display: block; animation: popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275); }
@keyframes popIn {
  from { transform: scale(0.85); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.fortune-grade {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--pink); color: white; font-size: 13px; font-weight: 700;
  padding: 4px 12px; border-radius: 20px;
  border: 2px solid var(--ink); box-shadow: 2px 2px 0 var(--ink); margin-bottom: 10px;
}
.fortune-main { font-size: 18px; font-weight: 900; color: var(--ink); margin-bottom: 8px; line-height: 1.4; }
.fortune-text { font-size: 13px; color: #555; line-height: 1.7; }
.fortune-tags { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
.ftag {
  font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
  border: 1.5px solid var(--ink); background: var(--yellow); color: var(--ink);
  box-shadow: 1px 1px 0 var(--ink);
}
.pet-row { display: flex; align-items: flex-end; gap: 10px; margin-top: 14px; }
.pet-row.right { flex-direction: row-reverse; }
.pet-wrap { text-align: center; flex-shrink: 0; }
.pet-avatar {
  width: 52px; height: 52px; border-radius: 50%; object-fit: cover;
  border: 2.5px solid var(--ink); box-shadow: 2px 2px 0 var(--ink); display: block;
}
.pet-name { font-size: 10px; font-weight: 700; color: var(--gray); margin-top: 3px; }
.bubble {
  background: var(--blue-light); border: 2px solid var(--ink);
  border-radius: 14px 14px 14px 4px;
  padding: 10px 13px; font-size: 12px; line-height: 1.6;
  color: var(--ink); box-shadow: 2px 2px 0 var(--ink);
  max-width: 200px; font-weight: 500;
}
.pet-row.right .bubble { border-radius: 14px 14px 4px 14px; background: var(--purple-light); }
.refresh-btn {
  background: none; border: 1.5px dashed var(--gray); color: var(--gray);
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  font-family: inherit; font-weight: 500; margin-top: 8px;
}
.refresh-btn:active { opacity: 0.5; }
.big-btn {
  width: 100%; padding: 14px; background: var(--yellow);
  color: var(--ink); border: 2.5px solid var(--ink); border-radius: 14px;
  font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer;
  box-shadow: 4px 4px 0 var(--ink); -webkit-tap-highlight-color: transparent;
  margin-top: 14px; transition: transform 0.08s, box-shadow 0.08s; letter-spacing: 1px;
}
.big-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--ink); }
.big-btn.pink { background: var(--pink); color: white; }
.big-btn.blue { background: var(--blue); color: white; }
.big-btn.green { background: var(--green); color: white; }
.food-result { display: none; text-align: center; padding: 8px 0 4px; }
.food-result.show { display: block; animation: popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275); }
.food-emoji { font-size: 52px; display: block; margin-bottom: 6px; }
.food-name { font-size: 22px; font-weight: 900; color: var(--ink); margin-bottom: 4px; }
.food-desc { font-size: 12px; color: var(--gray); margin-bottom: 8px; line-height: 1.6; }
.food-tag {
  display: inline-block; font-size: 11px; font-weight: 700;
  padding: 3px 12px; border-radius: 20px;
  background: var(--green); color: white;
  border: 1.5px solid var(--ink); box-shadow: 1px 1px 0 var(--ink);
}
.food-msg { font-size: 12px; color: var(--pink); font-weight: 700; margin-top: 10px; }
.food-placeholder { text-align: center; padding: 16px 0 8px; font-size: 13px; color: var(--gray); font-weight: 500; }
.idea-result { display: none; text-align: center; padding: 8px 0 4px; }
.idea-result.show { display: block; animation: popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275); }
.idea-icon-big { font-size: 48px; display: block; margin-bottom: 8px; }
.idea-title { font-size: 18px; font-weight: 900; color: var(--ink); margin-bottom: 6px; }
.idea-desc { font-size: 12px; color: #555; line-height: 1.7; margin: 0 4px 6px; }
.idea-placeholder { text-align: center; padding: 16px 0 8px; font-size: 13px; color: var(--gray); font-weight: 500; }

/* MOMENTS */
.moments-feed { display: flex; flex-direction: column; gap: 0; }
.moment-item {
  padding: 14px 0;
  border-bottom: 1.5px dashed #e0e4f0;
  animation: fadeSlide 0.4s ease both;
}
.moment-item:last-child { border-bottom: none; }
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.moment-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.moment-avatar {
  width: 42px; height: 42px; border-radius: 10px;
  object-fit: cover; border: 2px solid var(--ink);
  box-shadow: 2px 2px 0 var(--ink); flex-shrink: 0;
}
.moment-meta { flex: 1; }
.moment-name { font-size: 13px; font-weight: 700; color: var(--ink); }
.moment-vibe { font-size: 10px; font-weight: 400; color: var(--gray); margin-left: 4px; }
.moment-time { font-size: 10px; color: var(--gray); margin-top: 1px; }
.moment-body { padding-left: 52px; }
.moment-text { font-size: 13px; line-height: 1.75; color: var(--ink); margin-bottom: 8px; }
.moment-imgs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
.moment-img-cell {
  background: #f5f0ff; border: 1.5px solid var(--ink);
  border-radius: 8px; box-shadow: 1px 1px 0 var(--ink);
  font-size: 24px; width: 58px; height: 58px;
  display: flex; align-items: center; justify-content: center;
}
.moment-likes { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; flex-wrap: wrap; }
.likes-icon { font-size: 12px; }
.like-chip {
  display: inline-flex; align-items: center; gap: 3px;
  background: #ffe0ed; border: 1.5px solid var(--ink);
  border-radius: 20px; padding: 1px 7px;
  font-size: 10px; font-weight: 700; box-shadow: 1px 1px 0 var(--ink);
}
.like-chip img { width: 14px; height: 14px; border-radius: 50%; object-fit: cover; border: 1px solid var(--ink); }
.moment-comments { background: #f5f7ff; border-radius: 8px; padding: 7px 10px; }
.comment-item { font-size: 11px; line-height: 1.8; color: var(--ink); }
.comment-author { font-weight: 700; color: #4a6fa5; }
.moments-refresh-wrap { text-align: center; margin-top: 0; }
.footer { text-align: center; padding: 24px 20px 0; font-size: 11px; color: var(--gray); font-weight: 500; }
.star { position: fixed; pointer-events: none; font-size: 14px; opacity: 0.2; z-index: 0; }
</style>
</head>
<body>
<span class="star" style="top:8%;left:5%">⭐</span>
<span class="star" style="top:15%;right:8%">✨</span>
<span class="star" style="top:40%;left:3%">💫</span>
<span class="star" style="top:60%;right:5%">⭐</span>

<div class="header">
  <div class="header-date" id="headerDate">加载中...</div>
  <div class="header-main">
    <div class="header-title">今日好运签</div>
    <div class="header-badge">每日更新</div>
  </div>
  <div class="header-sub">🐾 诸事顺遂 · 开心第一</div>
</div>

<!-- 运势 -->
<div class="section">

  <div class="card">
    <div class="fortune-top">
      <button class="tube-btn" id="tubeBtn" onclick="drawFortune()">
        <svg viewBox="0 0 72 100" width="72" height="100" xmlns="http://www.w3.org/2000/svg">

      </button>
      <div class="fortune-hint" id="fortuneHint"><b>点我摇签！</b><br>今天的好运<br>在签桶里等你 🌟</div>

    <div class="fortune-card" id="fortuneCard">
      <div class="fortune-grade" id="fortuneGrade"></div>

      <div class="fortune-tags" id="fortuneTags"></div>

    <div class="pet-row">
      <div class="pet-wrap"><img class="pet-avatar" id="fortunePetImg" src="" alt=""><div class="pet-name" id="fortunePetName"></div></div>
      <div class="bubble" id="fortuneBubble">今天也要加油哦～ 🐾</div>
    </div>
    <div><button class="refresh-btn" onclick="refreshPet('fortune')">换个小伙伴 🔄</button></div>
  </div>
</div>

<!-- 吃什么 -->
<div class="section">
  <div class="section-label"><span class="dot" style="background:var(--blue)"></span>今天吃什么</div>
  <div class="card">
    <div id="foodPlaceholder" class="food-placeholder">🍱 命运帮你决定今天吃啥</div>
    <div class="food-result" id="foodResult">
      <span class="food-emoji" id="foodEmoji"></span>
      <div class="food-name" id="foodName"></div>
      <div class="food-desc" id="foodDesc"></div>
      <span class="food-tag" id="foodTag"></span>
      <div class="food-msg">好好吃饭，好好爱自己 💛</div>
    </div>
    <button class="big-btn blue" onclick="drawFood()">🎲 随机今日美食</button>
    <div class="pet-row right" style="margin-top:14px">
      <div class="pet-wrap"><img class="pet-avatar" id="foodPetImg" src="" alt=""><div class="pet-name" id="foodPetName"></div></div>
      <div class="bubble" id="foodBubble">吃好喝好！今天要犒劳自己～</div>
    </div>
    <div style="display:flex;justify-content:flex-end"><button class="refresh-btn" onclick="refreshPet('food')">换个小伙伴 🔄</button></div>
  </div>
</div>

<!-- 好点子 -->
<div class="section">
  <div class="section-label"><span class="dot" style="background:var(--purple)"></span>无聊好点子</div>
  <div class="card">
    <div id="ideaPlaceholder" class="idea-placeholder">💡 无聊了？点一下有惊喜</div>
    <div class="idea-result" id="ideaResult">
      <span class="idea-icon-big" id="ideaIcon"></span>
      <div class="idea-title" id="ideaTitle"></div>
      <div class="idea-desc" id="ideaDesc"></div>
    </div>
    <button class="big-btn pink" onclick="drawIdea()">✨ 给我一个好点子</button>
    <div class="pet-row" style="margin-top:14px">
      <div class="pet-wrap"><img class="pet-avatar" id="ideaPetImg" src="" alt=""><div class="pet-name" id="ideaPetName"></div></div>
      <div class="bubble" id="ideaBubble">动起来！哪怕一点点～ 💪</div>
    </div>
    <div><button class="refresh-btn" onclick="refreshPet('idea')">换个小伙伴 🔄</button></div>
  </div>
</div>

<!-- 朋友圈 -->
<div class="section">
  <div class="section-label"><span class="dot" style="background:var(--orange)"></span>宠物朋友圈</div>
  <div class="card">
    <div class="moments-feed" id="momentsFeed"></div>
    <div class="moments-refresh-wrap">
      <button class="big-btn green" onclick="renderMoments()">🔄 刷新朋友圈</button>
    </div>
  </div>
</div>

<div class="footer">🐾 好运每天都有 · 快乐由你定义 🐾</div>

function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function rndExclude(arr, exclude) {
  let i;
  do { i = Math.floor(Math.random() * arr.length); } while (arr[i] === exclude && arr.length > 1);
  return arr[i];
}
function rndIdx(arr, exclude=-1) {
  let i;
  do { i = Math.floor(Math.random() * arr.length); } while (i === exclude && arr.length > 1);
  return i;
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function timeAgo() {
  return rnd(["刚刚","2分钟前","5分钟前","12分钟前","半小时前","1小时前","2小时前","今天上午","今天中午","下午茶时间","今天傍晚"]);
}

function getComment(commenterName) {
  const pool = PERSONA_COMMENTS[commenterName];
  if (pool) {
    const t = rnd(pool);
    if (t === "") return null;
    return t;
  }
  return rnd(GENERIC_COMMENTS);
}

function renderMoments() {
  const feed = document.getElementById('momentsFeed');
  feed.innerHTML = '';
  const shuffled = shuffle(PET_NAMES);
  const count = 3 + Math.floor(Math.random() * 2);
  const posters = shuffled.slice(0, count);

  posters.forEach((posterName, i) => {
    const pool = POST_POOLS[posterName];
    const post = rnd(pool);
    const persona = PET_PERSONAS[posterName];
    const others = PET_NAMES.filter(n => n !== posterName);

    // Likes
    const likeCount = 1 + Math.floor(Math.random() * 4);
    const likers = shuffle(others).slice(0, likeCount);

    // Comments
    const commenterPool = shuffle(others.filter(n => Math.random() > 0.3));
    const commenters = commenterPool.slice(0, 1 + Math.floor(Math.random() * 2));

    const imgsHtml = post.imgs && post.imgs.length > 0
      ? `<div class="moment-imgs">${post.imgs.slice(0,3).map(e=>`<div class="moment-img-cell">${e}</div>`).join('')}</div>`
      : '';

    const likesHtml = likers.length > 0
      ? `<div class="moment-likes"><span class="likes-icon">❤️</span>${likers.map(n=>`<span class="like-chip"><img src="${PETS[n]}" alt="${n}"/>${n}</span>`).join('')}</div>`
      : '';

    const commentLines = commenters.map(commenter => {
      const text = getComment(commenter);
      if (!text) return '';
      return `<div class="comment-item"><span class="comment-author">${commenter}</span>：${text}</div>`;
    }).filter(Boolean).join('');

    const commentsHtml = commentLines
      ? `<div class="moment-comments">${commentLines}</div>`
      : '';

    const item = document.createElement('div');
    item.className = 'moment-item';
    item.style.animationDelay = (i * 0.09) + 's';
    item.innerHTML = `
      <div class="moment-header">
        <img class="moment-avatar" src="${PETS[posterName]}" alt="${posterName}">
        <div class="moment-meta">
          <div class="moment-name">${persona.emoji} ${posterName} <span style="font-size:10px;font-weight:400;color:var(--gray)">${persona.vibe}</span></div>
          <div class="moment-time">${timeAgo()}</div>
        </div>
      </div>
      <div class="moment-body">
        <div class="moment-text">${post.text.replace(/\n/g,'<br>')}</div>
        ${imgsHtml}
        ${likesHtml}
        ${commentsHtml}
      </div>
    `;
    feed.appendChild(item);
  });
}

function drawIdea() {
  const idea = IDEAS[Math.floor(Math.random()*IDEAS.length)];
  document.getElementById('ideaPlaceholder').style.display='none';
  document.getElementById('ideaIcon').textContent = idea.icon;
  document.getElementById('ideaTitle').textContent = idea.title;
  document.getElementById('ideaDesc').textContent = idea.desc;
  const r = document.getElementById('ideaResult');
  r.classList.remove('show'); void r.offsetWidth; r.classList.add('show');
  petIdxs.idea = rndIdx(PET_NAMES, petIdxs.idea);
  setPet('idea');
}
(function init() {
  const now = new Date();
  const days = ['周日','周一','周二','周三','周四','周五','周六'];
  document.getElementById('headerDate').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${days[now.getDay()]}`;
  petIdxs.fortune = rndIdx(PET_NAMES);
  petIdxs.food = rndIdx(PET_NAMES, petIdxs.fortune);
  petIdxs.idea = rndIdx(PET_NAMES, petIdxs.food);
  setPet('fortune'); setPet('food'); setPet('idea');
  renderMoments();
})();

</script>
